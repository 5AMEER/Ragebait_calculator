<text font-family="sans-serif" font-size="12" x="110" y="338" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Confident nonsense</text>

<rect x="185" y="296" width="120" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
