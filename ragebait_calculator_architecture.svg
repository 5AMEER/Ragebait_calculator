<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- LAYER 0: User -->
<g class="c-gray">
  <rect x="270" y="20" width="140" height="44" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">User</text>
</g>

<line x1="340" y1="64" x2="340" y2="104" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LAYER 1: UI Shell -->
<rect x="100" y="104" width="480" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="124" text-anchor="middle" dominant-baseline="central" fill="#3C3489">UI Shell — React PWA</text>
<text font-family="sans-serif" font-size="12" x="340" y="146" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Looks exactly like a normal calculator</text>

<line x1="340" y1="160" x2="340" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LAYER 2: Ragebait Engine -->
<rect x="100" y="196" width="480" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
