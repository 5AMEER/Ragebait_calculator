<line x1="245" y1="352" x2="270" y2="426" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="352" x2="340" y2="426" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="470" y1="352" x2="410" y2="426" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="590" y1="352" x2="460" y2="426" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

