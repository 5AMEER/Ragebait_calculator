<text font-family="sans-serif" font-size="12" x="340" y="338" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Fire, collapse, crash</text>

<rect x="415" y="296" width="110" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
