<rect x="180" y="426" width="320" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="446" text-anchor="middle" dominant-baseline="central" fill="#085041">Output renderer</text>
<text font-family="sans-serif" font-size="12" x="340" y="468" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Animates result + sound + overlay</text>

<line x1="340" y1="482" x2="340" y2="516" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

