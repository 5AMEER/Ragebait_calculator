<text font-family="sans-serif" font-size="12" x="340" y="238" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Intercepts every = press, picks a chaos mode</text>

<!-- arrows to chaos modules -->
<line x1="175" y1="252" x2="115" y2="296" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
