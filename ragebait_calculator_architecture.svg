<text font-family="sans-serif" font-size="12" x="180" y="558" text-anchor="middle" dominant-baseline="central" fill="#185FA5">History, streak, chaos level</text>

<rect x="380" y="516" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="500" y="536" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Asset store</text>
<text font-family="sans-serif" font-size="12" x="500" y="558" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Memes, sounds, insults pool</text>

<line x1="180" y1="572" x2="340" y2="620" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="572" x2="340" y2="620" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Deploy -->
<rect x="200" y="620" width="280" height="56" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="640" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Deploy — Vercel / GitHub Pages</text>
<text font-family="sans-serif" font-size="12" x="340" y="662" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">PWA, shareable link, free hosting</text>
